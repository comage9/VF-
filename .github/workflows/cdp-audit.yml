name: CDP Performance Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  cdp-audit:
    name: Chrome DevTools Protocol Audit
    runs-on: ubuntu-latest

    services:
      django:
        image: python:3.11
        ports:
          - 5176:5176
        options: >-
          --health-cmd "curl -f http://localhost:5176/api/health || exit 1"
          --health-interval 30s
          --health-timeout 90s
          --health-retries 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Node Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Python Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Migrations
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings
        run: |
          python manage.py migrate --noinput

      - name: Start Django Server
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings
        run: |
          python manage.py runserver 0.0.0.0:5176 &
          sleep 5
        shell: bash

      - name: Start Node Server
        working-directory: ./frontend
        env:
          PORT: 5174
          DJANGO_BASE_URL: http://localhost:5176
        run: |
          npm run dev &
          sleep 5
        shell: bash

      - name: Start Chrome with Remote Debugging
        run: |
          google-chrome --headless=new --no-sandbox --disable-gpu --remote-debugging-port=9222 --disable-dev-shm-usage &
          sleep 3

      - name: Run CDP Auditor
        working-directory: ./frontend
        env:
          CI: true
        run: npx tsx scripts/cdp-inspector.ts
        continue-on-error: true

      - name: Run Playwright + CDP Tests
        working-directory: ./frontend
        run: npx playwright test tests/cdp-audit.spec.ts
        continue-on-error: true

      - name: Generate Audit Report
        if: always()
        working-directory: ./frontend
        run: |
          npx tsx scripts/cdp-inspector.ts > audit-report.txt 2>&1 || true
          echo "## CDP Audit Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-report.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cdp-audit-results
          path: |
            frontend/playwright-report/
            frontend/audit-report.txt
            frontend/screenshots/

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'frontend/audit-report.txt');

            let commentBody = '## 📊 CDP Performance Audit Results\n\n';

            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              commentBody += '```\n' + report + '\n```\n';
            } else {
              commentBody += '⚠️ Audit report not generated.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

  performance-trend:
    name: Performance Trend Analysis
    runs-on: ubuntu-latest
    needs: cdp-audit
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: cdp-audit-results

      - name: Compare with Previous Run
        run: |
          # This step would compare current metrics with previous runs
          # Store metrics in a database or GitHub Actions cache
          echo "Performance trend comparison would go here"
          echo "Track FCP, LCP, TTI, Bundle Size over time"

  notify-failures:
    name: Notify on Failures
    runs-on: ubuntu-latest
    needs: cdp-audit
    if: failure()

    steps:
      - name: Send Notification
        # Add your notification service (Slack, Discord, etc.)
        run: |
          echo "CDP audit failed. Send notification..."
          # Example: curl to Slack webhook
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text":"CDP Audit Failed for ${{ github.repository }}"}'
