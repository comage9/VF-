<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMS - 생산 이력</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    .filter-bar { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 20px; margin-bottom:18px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .history-summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:20px; }
    .hs-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
    .hs-val { font-size:22px; font-weight:800; color:var(--primary); }
    .hs-label { font-size:11px; color:var(--text-muted); margin-top:4px; }
    .chart-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    @media(max-width:768px){ .chart-row{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-title">생산 이력 <span>완료된 생산 기록</span></div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" onclick="exportCSV()">
          <i class="fas fa-download"></i> CSV 내보내기
        </button>
      </div>
    </header>

    <main class="content">
      <!-- 요약 통계 -->
      <div class="history-summary" id="h-summary">
        <div class="hs-card"><div class="hs-val" id="hs-total">-</div><div class="hs-label">완료 건수</div></div>
        <div class="hs-card"><div class="hs-val" id="hs-qty">-</div><div class="hs-label">총 생산 수량</div></div>
        <div class="hs-card"><div class="hs-val" id="hs-hours">-</div><div class="hs-label">총 작업 시간(h)</div></div>
        <div class="hs-card"><div class="hs-val" id="hs-products">-</div><div class="hs-label">제품 종류</div></div>
        <div class="hs-card"><div class="hs-val" id="hs-dates">-</div><div class="hs-label">작업 일수</div></div>
      </div>

      <!-- 차트 -->
      <div class="chart-row">
        <div class="card">
          <div class="card-header"><div class="card-title"><i class="fas fa-chart-bar" style="color:var(--success)"></i> 제품별 완료 수량 (Top 10)</div></div>
          <div class="card-body" style="height:260px;position:relative"><canvas id="prodChart"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title"><i class="fas fa-chart-line" style="color:var(--primary)"></i> 일별 완료 추이</div></div>
          <div class="card-body" style="height:260px;position:relative"><canvas id="dateChart"></canvas></div>
        </div>
      </div>

      <!-- 필터 -->
      <div class="filter-bar">
        <div class="search-bar">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="h-search" class="form-control" placeholder="제품명, 금형번호 검색..." oninput="applyFilter()">
        </div>
        <input type="date" id="h-from" class="form-control" style="width:150px" onchange="applyFilter()">
        <span style="font-size:12px;color:var(--text-muted)">~</span>
        <input type="date" id="h-to" class="form-control" style="width:150px" onchange="applyFilter()">
        <select id="h-machine" class="form-control" style="width:130px" onchange="applyFilter()">
          <option value="">전체 기계</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="resetFilter()">
          <i class="fas fa-undo"></i> 초기화
        </button>
        <span id="h-count" style="font-size:12px;color:var(--text-muted);margin-left:auto"></span>
      </div>

      <!-- 테이블 -->
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="fas fa-history" style="color:var(--success)"></i> 완료된 생산 이력</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>일자</th>
                <th>기계</th>
                <th>금형</th>
                <th>제품명</th>
                <th>색상</th>
                <th>롯트번호</th>
                <th class="td-right">생산수량(낱개)</th>
                <th class="td-right">작업시간(h)</th>
                <th>비고</th>
              </tr>
            </thead>
            <tbody id="h-tbody">
              <tr><td colspan="9"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div style="padding:12px 20px; border-top:1px solid var(--border);">
          <div class="pagination" id="h-pagination"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/common.js"></script>
<script>
document.getElementById('sidebar').innerHTML = renderSidebar('history');

let allCompleted = [], filtered = [];
let currentPage = 1;
const PAGE_SIZE = 25;
let prodChartInst, dateChartInst;

async function init() {
  const [planRes, machineRes] = await Promise.all([
    API.get('production_plans', { limit: 200 }),
    API.get('machines', { limit: 50 })
  ]);
  const plans = planRes.data || [];
  const machines = machineRes.data || [];

  allCompleted = plans.filter(p => p.status === 'completed');

  // 기계 필터 셀렉트
  const mSel = document.getElementById('h-machine');
  machines.forEach(m => {
    mSel.innerHTML += `<option value="${m.machine_number}">${m.machine_number}호기</option>`;
  });

  renderSummary(allCompleted);
  renderCharts(allCompleted);
  applyFilter();
}

function renderSummary(data) {
  const total = data.length;
  const qty   = data.reduce((s,p)=>(s + (Number(p.planned_qty)||0)), 0);
  const hours = data.reduce((s,p)=>(s + (Number(p.planned_hours)||0)), 0);
  const prods = new Set(data.map(p=>p.product_name_kr||p.product_name_en)).size;
  const dates = new Set(data.map(p=>(p.plan_date||'').substring(0,10))).size;

  document.getElementById('hs-total').textContent    = NumUtil.fmt(total);
  document.getElementById('hs-qty').textContent      = NumUtil.fmt(qty);
  document.getElementById('hs-hours').textContent    = NumUtil.fmt(hours);
  document.getElementById('hs-products').textContent = NumUtil.fmt(prods);
  document.getElementById('hs-dates').textContent    = NumUtil.fmt(dates);
}

function renderCharts(data) {
  // 제품별 수량
  const prodMap = {};
  data.forEach(p => {
    const k = p.product_name_kr || p.product_name_en || '기타';
    prodMap[k] = (prodMap[k]||0) + (Number(p.planned_qty)||0);
  });
  const top10 = Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,10);

  const ctx1 = document.getElementById('prodChart').getContext('2d');
  if (prodChartInst) prodChartInst.destroy();
  prodChartInst = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: top10.map(([k])=> k.length>10? k.substring(0,10)+'…': k),
      datasets: [{ label:'수량', data: top10.map(([,v])=>v),
        backgroundColor: 'rgba(22,163,74,.75)', borderRadius:5 }]
    },
    options: {
      responsive:true, maintainAspectRatio:false, indexAxis:'y',
      plugins:{ legend:{ display:false } },
      scales:{ x:{ beginAtZero:true, ticks:{ font:{size:11} } }, y:{ ticks:{ font:{size:10} } } }
    }
  });

  // 일별 추이
  const dateMap = {};
  data.forEach(p => {
    const d = (p.plan_date||'').substring(0,10);
    if (d) dateMap[d] = (dateMap[d]||0) + (Number(p.planned_qty)||0);
  });
  const dates = Object.keys(dateMap).sort();

  const ctx2 = document.getElementById('dateChart').getContext('2d');
  if (dateChartInst) dateChartInst.destroy();
  dateChartInst = new Chart(ctx2, {
    type: 'line',
    data: {
      labels: dates.map(d => DateUtil.fmtShort(d)),
      datasets: [{ label:'완료 수량', data: dates.map(d=>dateMap[d]),
        fill:true, backgroundColor:'rgba(22,163,74,.1)',
        borderColor:'#16a34a', borderWidth:2.5,
        pointRadius:3, tension:0.4 }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ x:{ ticks:{ font:{size:11} } }, y:{ beginAtZero:true, ticks:{ font:{size:11} } } }
    }
  });
}

function applyFilter() {
  const q    = (document.getElementById('h-search').value||'').toLowerCase();
  const from = document.getElementById('h-from').value;
  const to   = document.getElementById('h-to').value;
  const mach = document.getElementById('h-machine').value;

  filtered = allCompleted.filter(p => {
    const d = (p.plan_date||'').substring(0,10);
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    if (mach && String(p.machine_number) !== String(mach)) return false;
    if (q) {
      const h = [p.product_name_kr, p.product_name_en, String(p.mold_number), p.color, p.lot_number].join(' ').toLowerCase();
      if (!h.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => ((b.plan_date||'') > (a.plan_date||'') ? 1 : -1));

  document.getElementById('h-count').textContent = `총 ${filtered.length}건`;
  currentPage = 1;
  renderTable();
  renderPagination();
}

function renderTable() {
  const start = (currentPage-1)*PAGE_SIZE;
  const page  = filtered.slice(start, start+PAGE_SIZE);
  const tbody = document.getElementById('h-tbody');
  if (page.length===0) {
    tbody.innerHTML = `<tr><td colspan="9">
      <div class="empty-state"><div class="empty-icon">🗂️</div><h3>이력이 없습니다</h3></div>
    </td></tr>`;
    return;
  }
  tbody.innerHTML = page.map(p => `
    <tr>
      <td>${DateUtil.fmt(p.plan_date)}</td>
      <td><span class="badge badge-teal">${p.machine_number}호</span></td>
      <td style="font-weight:600">${p.mold_number||'-'}</td>
      <td>
        <div style="font-weight:600">${p.product_name_kr||'-'}</div>
        <div style="font-size:11px;color:var(--text-muted)">${p.product_name_en||''}</div>
      </td>
      <td><span class="badge badge-gray">${p.color||'-'}</span></td>
      <td style="font-size:12px;color:var(--text-muted)">${p.lot_number||'-'}</td>
      <td class="td-right td-num">${NumUtil.fmt(p.planned_qty)}</td>
      <td class="td-center" style="font-weight:600;color:var(--success)">${p.planned_hours||'-'}h</td>
      <td style="font-size:12px;color:var(--text-muted)">${p.remark||''}</td>
    </tr>
  `).join('');
}

function renderPagination() {
  const total = Math.ceil(filtered.length/PAGE_SIZE);
  const pg = document.getElementById('h-pagination');
  if (total<=1) { pg.innerHTML=''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i=1; i<=total; i++) {
    if (i===1||i===total||Math.abs(i-currentPage)<=2)
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i-currentPage)===3)
      html += `<span style="padding:0 4px;color:var(--text-muted)">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(n) {
  const total = Math.ceil(filtered.length/PAGE_SIZE);
  if (n<1||n>total) return;
  currentPage = n;
  renderTable();
  renderPagination();
}

function resetFilter() {
  document.getElementById('h-search').value = '';
  document.getElementById('h-from').value = '';
  document.getElementById('h-to').value = '';
  document.getElementById('h-machine').value = '';
  applyFilter();
}

function exportCSV() {
  const headers = ['일자','기계','금형','제품명(KR)','제품명(EN)','색상','롯트번호','생산수량','작업시간','비고'];
  const rows = filtered.map(p=>[p.plan_date, p.machine_number, p.mold_number, p.product_name_kr, p.product_name_en, p.color, p.lot_number, p.planned_qty, p.planned_hours, p.remark]);
  const csv = [headers,...rows].map(r=>r.map(c=>`"${c||''}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `생산이력_${DateUtil.today()}.csv`;
  a.click();
  Toast.success('CSV 내보내기 완료');
}

document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('open'); });
});
init();
</script>
</body>
</html>
