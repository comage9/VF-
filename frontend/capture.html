<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>페이지 캡처 분석</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f0f4f8; }
  .result { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  pre { font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow: auto; background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 6px; }
  h2 { font-size: 14px; color: #1e40af; margin-bottom: 8px; }
  .loading { color: #64748b; }
</style>
</head>
<body>
<h1>VF 대시보드 페이지 구조 분석</h1>

<div id="results"></div>

<script>
const URLS = [
  'http://bonohouse.p-e.kr:5174/delivery',
  'http://bonohouse.p-e.kr:5174/outbound',
  'http://bonohouse.p-e.kr:5174/outbound?tab=fc-inbound',
  'http://bonohouse.p-e.kr:5174/inventory/enhanced',
  'http://bonohouse.p-e.kr:5174/production',
  'http://bonohouse.p-e.kr:5174/master'
];

const results = document.getElementById('results');

async function fetchPage(url) {
  try {
    const res = await fetch(url, { mode: 'cors' });
    const html = await res.text();
    return { url, status: res.status, html: html.substring(0, 5000) };
  } catch(e) {
    return { url, error: e.message };
  }
}

async function run() {
  results.innerHTML = '<p class="loading">분석 중...</p>';
  let out = '';
  for (const url of URLS) {
    const r = await fetchPage(url);
    out += `URL: ${url}\n`;
    if (r.error) {
      out += `ERROR: ${r.error}\n`;
    } else {
      out += `STATUS: ${r.status}\n`;
      out += `PREVIEW:\n${r.html}\n`;
    }
    out += '\n' + '='.repeat(80) + '\n\n';
  }
  console.log('FETCH_RESULT:' + out);
  results.innerHTML = `<pre>${out.substring(0, 10000)}</pre>`;
}
run();
</script>
</body>
</html>
