<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출고 분석 - BONO PMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      align-items: center; margin-bottom: 20px;
    }
    .chart-grid-2 {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px; margin-bottom: 24px;
    }
    .chart-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px; margin-bottom: 24px;
    }
    .chart-box { height: 320px; position: relative; }
    .chart-box-lg { height: 400px; position: relative; }
    .tab-bar {
      display: flex; gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px 22px;
      font-size: 13px; font-weight: 600;
      color: var(--text-muted);
      background: none; border: none;
      cursor: pointer; font-family: inherit;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all .2s;
    }
    .tab-btn:hover { color: var(--primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .rank-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .rank-item:last-child { border: none; }
    .rank-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .rank-num.gold   { background: #f59e0b; }
    .rank-num.silver { background: #94a3b8; }
    .rank-num.bronze { background: #cd7c49; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; }
    .rank-bar { height: 100%; border-radius: 3px; background: var(--primary-light); }
    .rank-qty { font-size: 13px; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .fc-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
    .fc-coupang { background:#fee2e2; color:#b91c1c; }
    .fc-naver   { background:#dcfce7; color:#15803d; }
    .fc-other   { background:#f1f5f9; color:#475569; }
    @media (max-width: 900px) {
      .chart-grid-2, .chart-grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar" data-page="outbound"></aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-title">출고 분석 <span>판매·출고 통계 대시보드</span></div>
      <div class="topbar-actions">
        <span id="today-date" style="font-size:13px;color:var(--text-muted);"></span>
        <button class="btn btn-secondary btn-sm" onclick="exportCSV()">
          <i class="fas fa-download"></i> CSV 내보내기
        </button>
        <button class="btn btn-primary btn-sm" onclick="loadData()">
          <i class="fas fa-sync-alt"></i> 새로고침
        </button>
      </div>
    </header>

    <main class="content">
      <!-- 기간 필터 -->
      <div class="filter-bar">
        <span style="font-size:13px;font-weight:600;color:var(--text-muted);">기간</span>
        <div class="date-tabs">
          <button class="date-tab" data-days="7" onclick="setDays(7, this)">7일</button>
          <button class="date-tab active" data-days="30" onclick="setDays(30, this)">30일</button>
          <button class="date-tab" data-days="60" onclick="setDays(60, this)">60일</button>
          <button class="date-tab" data-days="90" onclick="setDays(90, this)">90일</button>
          <button class="date-tab" data-days="180" onclick="setDays(180, this)">180일</button>
          <button class="date-tab" data-days="365" onclick="setDays(365, this)">1년</button>
        </div>
        <select class="form-control" id="groupBySelect" style="width:100px;" onchange="loadData()">
          <option value="day">일별</option>
          <option value="week">주별</option>
          <option value="month">월별</option>
        </select>
      </div>

      <!-- KPI 카드 -->
      <div class="summary-row" id="kpi-row">
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-box"></i></div>
          <div class="stat-info">
            <div class="stat-label">총 출고 건수</div>
            <div class="stat-value" id="kpi-count">-</div>
            <div class="stat-sub">전체 누적</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-cubes"></i></div>
          <div class="stat-info">
            <div class="stat-label">총 출고 수량</div>
            <div class="stat-value" id="kpi-qty">-</div>
            <div class="stat-sub">단위: 개</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon amber"><i class="fas fa-won-sign"></i></div>
          <div class="stat-info">
            <div class="stat-label">총 매출액</div>
            <div class="stat-value" id="kpi-sales">-</div>
            <div class="stat-sub">합계</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon teal"><i class="fas fa-calendar-day"></i></div>
          <div class="stat-info">
            <div class="stat-label">일 평균 출고</div>
            <div class="stat-value" id="kpi-avg">-</div>
            <div class="stat-sub">수량 기준</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple"><i class="fas fa-tag"></i></div>
          <div class="stat-info">
            <div class="stat-label">평균 단가</div>
            <div class="stat-value" id="kpi-price">-</div>
            <div class="stat-sub">건당 평균</div>
          </div>
        </div>
      </div>

      <!-- 탭 -->
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('trend', this)">📈 추세 분석</button>
        <button class="tab-btn" onclick="switchTab('products', this)">🏆 상품 순위</button>
        <button class="tab-btn" onclick="switchTab('table', this)">📋 출고 목록</button>
      </div>

      <!-- 추세 분석 탭 -->
      <div class="tab-panel active" id="tab-trend">
        <div class="chart-grid-2">
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="fas fa-chart-line"></i> 일별 출고 추세</div>
            </div>
            <div class="card-body chart-box-lg">
              <canvas id="trendChart"></canvas>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="fas fa-chart-pie"></i> 카테고리별 비중</div>
            </div>
            <div class="card-body chart-box-lg">
              <canvas id="categoryChart"></canvas>
            </div>
          </div>
        </div>
        <div class="chart-grid-3">
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="fas fa-chart-bar"></i> 요일별 출고 패턴</div>
            </div>
            <div class="card-body chart-box">
              <canvas id="weekdayChart"></canvas>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="fas fa-chart-area"></i> 매출 추세</div>
            </div>
            <div class="card-body chart-box">
              <canvas id="salesTrendChart"></canvas>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="fas fa-percentage"></i> 월별 성장률</div>
            </div>
            <div class="card-body chart-box">
              <canvas id="growthChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- 상품 순위 탭 -->
      <div class="tab-panel" id="tab-products">
        <div class="chart-grid-2">
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="fas fa-trophy"></i> 출고량 TOP 10</div>
              <select class="form-control btn-sm" id="topMetric" style="width:120px;" onchange="renderTopProducts()">
                <option value="quantity">수량 기준</option>
                <option value="salesAmount">매출 기준</option>
              </select>
            </div>
            <div class="card-body" id="top-products-list">
              <div class="spinner"></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="fas fa-chart-bar"></i> TOP 10 차트</div>
            </div>
            <div class="card-body chart-box-lg">
              <canvas id="topChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- 출고 목록 탭 -->
      <div class="tab-panel" id="tab-table">
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-list"></i> 출고 내역</div>
            <div style="display:flex;gap:8px;align-items:center;">
              <div class="search-bar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="form-control" id="searchInput" placeholder="상품명·바코드 검색" oninput="filterTable()" style="width:220px;">
              </div>
              <select class="form-control btn-sm" id="statusFilter" onchange="filterTable()" style="width:100px;">
                <option value="">전체 상태</option>
                <option value="완료">완료</option>
                <option value="취소">취소</option>
              </select>
              <select class="form-control btn-sm" id="catFilter" onchange="filterTable()" style="width:120px;">
                <option value="">전체 카테고리</option>
              </select>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>출고일</th>
                  <th>상품명</th>
                  <th>카테고리</th>
                  <th class="td-center">바코드</th>
                  <th class="td-right">수량</th>
                  <th class="td-right">박스수</th>
                  <th class="td-right">매출액</th>
                  <th class="td-center">상태</th>
                </tr>
              </thead>
              <tbody id="outbound-tbody">
                <tr><td colspan="8" style="text-align:center;padding:40px;"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
          <div style="padding:12px 22px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);">
            <span id="table-info" style="font-size:12px;color:var(--text-muted);"></span>
            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>
<script src="js/common.js"></script>
<script>
// ── 상태 변수 ──
let currentDays = 30;
let statsData = null;
let topData = [];
let outboundRows = [];
let filteredRows = [];
let currentPage = 1;
const PAGE_SIZE = 30;

// 차트 인스턴스 캐시
const charts = {};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

// ── 탭 전환 ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'products' && topData.length === 0) loadTopProducts();
  if (name === 'table' && outboundRows.length === 0) loadOutboundList();
}

// ── 기간 설정 ──
function setDays(d, btn) {
  currentDays = d;
  document.querySelectorAll('.date-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadData();
}

// ── 메인 데이터 로드 ──
async function loadData() {
  const groupBy = document.getElementById('groupBySelect').value;
  try {
    const data = await VF_API.outboundStats(currentDays, groupBy);
    statsData = data;
    renderKPI(data.summary);
    renderTrendCharts(data.dailyTrend || []);
  } catch (e) {
    Toast.error('출고 데이터 로드 실패: ' + e.message);
  }
}

// ── KPI 렌더 ──
function renderKPI(s) {
  if (!s) return;
  document.getElementById('kpi-count').textContent  = NumUtil.fmt(s.totalCount);
  document.getElementById('kpi-qty').textContent    = NumUtil.fmt(s.totalQuantity);
  document.getElementById('kpi-sales').textContent  = NumUtil.fmtKRW(s.totalSalesAmount);
  const days = statsData?.dailyTrend?.length || 1;
  const avgQty = Math.round((s.totalQuantity || 0) / days);
  document.getElementById('kpi-avg').textContent = NumUtil.fmt(avgQty) + '개';
  const avgPrice = s.totalCount ? Math.round((s.totalSalesAmount || 0) / s.totalCount) : 0;
  document.getElementById('kpi-price').textContent = NumUtil.fmtKRW(avgPrice);
}

// ── 추세 차트 렌더 ──
function renderTrendCharts(trend) {
  if (!trend || trend.length === 0) return;

  // 날짜 유효성 체크
  const validTrend = trend.filter(d => {
    const dt = new Date(d.date);
    return !isNaN(dt.getTime()) && dt.getFullYear() > 2000;
  });

  const labels = validTrend.map(d => {
    const dt = new Date(d.date);
    return `${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
  });
  const qtys   = validTrend.map(d => d.quantity);
  const sales  = validTrend.map(d => d.salesAmount);

  // 출고 추세 차트
  destroyChart('trend');
  const ctx1 = document.getElementById('trendChart').getContext('2d');
  charts['trend'] = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: '출고 수량',
          data: qtys,
          backgroundColor: 'rgba(59,130,246,0.6)',
          borderColor: '#3b82f6',
          borderWidth: 1,
          yAxisID: 'y'
        },
        {
          label: '매출액(만원)',
          data: sales.map(s => Math.round(s / 10000)),
          type: 'line',
          borderColor: '#f59e0b',
          backgroundColor: 'rgba(245,158,11,0.1)',
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
          yAxisID: 'y2'
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top' } },
      scales: {
        y:  { position: 'left',  title: { display: true, text: '수량' } },
        y2: { position: 'right', title: { display: true, text: '만원' }, grid: { drawOnChartArea: false } }
      }
    }
  });

  // 카테고리 파이 차트 (카테고리 데이터가 없으면 더미)
  renderCategoryChart();

  // 요일별 패턴
  const weekdaySums = Array(7).fill(0);
  const weekdayCnts = Array(7).fill(0);
  validTrend.forEach(d => {
    const day = new Date(d.date).getDay();
    weekdaySums[day] += d.quantity;
    weekdayCnts[day]++;
  });
  const weekLabels = ['일','월','화','수','목','금','토'];
  const weekAvg = weekdaySums.map((s,i) => weekdayCnts[i] ? Math.round(s / weekdayCnts[i]) : 0);

  destroyChart('weekday');
  const ctx3 = document.getElementById('weekdayChart').getContext('2d');
  charts['weekday'] = new Chart(ctx3, {
    type: 'bar',
    data: {
      labels: weekLabels,
      datasets: [{ label: '평균 출고량', data: weekAvg,
        backgroundColor: weekAvg.map((_,i) => i===0||i===6 ? 'rgba(248,113,113,0.7)' : 'rgba(59,130,246,0.7)') }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } } }
  });

  // 매출 추세 (라인)
  destroyChart('salesTrend');
  const ctx4 = document.getElementById('salesTrendChart').getContext('2d');
  charts['salesTrend'] = new Chart(ctx4, {
    type: 'line',
    data: {
      labels,
      datasets: [{ label: '매출(만원)', data: sales.map(s => Math.round(s/10000)),
        borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)',
        borderWidth: 2, pointRadius: 0, fill: true }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { title: { display: true, text: '만원' } } } }
  });

  // 성장률 차트
  const growthData = [];
  for (let i = 1; i < validTrend.length; i++) {
    const prev = validTrend[i-1].quantity;
    const curr = validTrend[i].quantity;
    const rate = prev ? Math.round((curr - prev) / prev * 100) : 0;
    growthData.push(rate);
  }

  destroyChart('growth');
  const ctx5 = document.getElementById('growthChart').getContext('2d');
  charts['growth'] = new Chart(ctx5, {
    type: 'bar',
    data: {
      labels: labels.slice(1),
      datasets: [{ label: '증감률(%)', data: growthData,
        backgroundColor: growthData.map(v => v >= 0 ? 'rgba(16,185,129,0.7)' : 'rgba(239,68,68,0.7)'),
        borderWidth: 0 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { title: { display: true, text: '%' } } } }
  });
}

// ── 카테고리 차트 ──
// 더미 데이터 완전 제거 — 실제 outboundRows만 사용
function renderCategoryChart() {
  if (outboundRows.length === 0) return;
  const catData = {};
  outboundRows.forEach(r => {
    const cat = r.category || '기타';
    catData[cat] = (catData[cat] || 0) + (Number(r.quantity) || 1);
  });
  const catLabels = Object.keys(catData).sort((a,b) => catData[b] - catData[a]);
  const catVals   = catLabels.map(k => catData[k]);
  const colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16'];

  destroyChart('category');
  const ctx2 = document.getElementById('categoryChart').getContext('2d');
  ChartManager.set('category', new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: catLabels,
      datasets: [{ data: catVals,
        backgroundColor: colors.slice(0, catLabels.length),
        borderWidth: 2 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } } }
  }));
}

// ── TOP 상품 로드 ──
async function loadTopProducts() {
  try {
    topData = await VF_API.topProducts(currentDays, 10);
    renderTopProducts();
  } catch (e) {
    Toast.error('TOP 상품 로드 실패');
  }
}

function renderTopProducts() {
  const metric = document.getElementById('topMetric').value;
  const sorted = [...topData].sort((a,b) => b[metric] - a[metric]);
  const maxVal = sorted[0]?.[metric] || 1;

  // 리스트
  const listEl = document.getElementById('top-products-list');
  listEl.innerHTML = sorted.map((item, i) => {
    const val = item[metric];
    const pct = Math.round(val / maxVal * 100);
    const numCls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const displayVal = metric === 'salesAmount' ? NumUtil.fmtKRW(val) : NumUtil.fmt(val) + '개';
    return `
      <div class="rank-item">
        <div class="rank-num ${numCls}">${i+1}</div>
        <div class="rank-info">
          <div class="rank-name" title="${item.name}">${item.name}</div>
          <div class="rank-bar-wrap" style="margin-top:4px;">
            <div class="rank-bar" style="width:${pct}%;background:${i<3?'#3b82f6':'#94a3b8'}"></div>
          </div>
        </div>
        <div class="rank-qty">${displayVal}</div>
      </div>
    `;
  }).join('');

  // 차트
  destroyChart('top');
  const ctx = document.getElementById('topChart').getContext('2d');
  const topLabels = sorted.map(d => d.name.length > 14 ? d.name.slice(0,14)+'…' : d.name);
  charts['top'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: topLabels,
      datasets: [{ label: metric === 'quantity' ? '수량' : '매출(만원)',
        data: metric === 'quantity' ? sorted.map(d=>d.quantity) : sorted.map(d=>Math.round(d.salesAmount/10000)),
        backgroundColor: 'rgba(59,130,246,0.75)',
        borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { title: { display: true, text: metric==='quantity'?'수량':'만원' } } }
    }
  });
}

// ── 출고 목록 로드 ──
async function loadOutboundList() {
  try {
    const data = await VF_API.outboundList({ days: currentDays, limit: 500 });
    outboundRows = Array.isArray(data) ? data : (data.results || data.data || []);
    buildCatFilter();
    filterTable();
  } catch (e) {
    document.getElementById('outbound-tbody').innerHTML =
      `<tr><td colspan="8" style="text-align:center;padding:40px;color:#ef4444;">데이터 로드 실패: ${e.message}</td></tr>`;
  }
}

function buildCatFilter() {
  const cats = [...new Set(outboundRows.map(r => r.category).filter(Boolean))].sort();
  const sel = document.getElementById('catFilter');
  sel.innerHTML = '<option value="">전체 카테고리</option>' +
    cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

function filterTable() {
  const kw  = document.getElementById('searchInput').value.toLowerCase();
  const st  = document.getElementById('statusFilter').value;
  const cat = document.getElementById('catFilter').value;
  filteredRows = outboundRows.filter(r => {
    if (kw && !((r.product_name||'').toLowerCase().includes(kw) || (r.barcode||'').toLowerCase().includes(kw))) return false;
    if (st  && r.status !== st)   return false;
    if (cat && r.category !== cat) return false;
    return true;
  });
  currentPage = 1;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('outbound-tbody');
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filteredRows.slice(start, start + PAGE_SIZE);

  if (page.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#94a3b8;">출고 데이터가 없습니다</td></tr>`;
    document.getElementById('table-info').textContent = '';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = page.map(r => `
    <tr>
      <td>${DateUtil.fmt(r.outbound_date)}</td>
      <td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${r.product_name}">${r.product_name||'-'}</td>
      <td><span class="badge badge-blue">${r.category||'-'}</span></td>
      <td class="td-center"><code style="font-size:11px;">${r.barcode||'-'}</code></td>
      <td class="td-right td-num">${NumUtil.fmt(r.quantity)}</td>
      <td class="td-right">${NumUtil.fmt(r.box_quantity)}</td>
      <td class="td-right td-num">${NumUtil.fmtKRWFull(r.sales_amount)}</td>
      <td class="td-center"><span class="badge ${r.status==='완료'?'badge-green':'badge-gray'}">${r.status||'-'}</span></td>
    </tr>
  `).join('');

  const total = filteredRows.length;
  document.getElementById('table-info').textContent =
    `총 ${NumUtil.fmt(total)}건 | ${start+1}–${Math.min(start+PAGE_SIZE, total)}건 표시`;
  renderPagination(Math.ceil(total / PAGE_SIZE));
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  const start = Math.max(1, currentPage - 2);
  const end   = Math.min(totalPages, currentPage + 2);
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span style="padding:0 4px">…</span>':''}`;
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < totalPages) html += `${end<totalPages-1?'<span style="padding:0 4px">…</span>':''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const totalPages = Math.ceil(filteredRows.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
}

// ── CSV 내보내기 ──
function exportCSV() {
  const rows = [['출고일','상품명','카테고리','바코드','수량','박스수','매출액','상태']];
  filteredRows.forEach(r => rows.push([
    r.outbound_date, r.product_name, r.category, r.barcode,
    r.quantity, r.box_quantity, r.sales_amount, r.status
  ]));
  downloadCSV(rows, `출고내역_${DateUtil.today()}.csv`);
}

// ── 초기화 ──
document.addEventListener('DOMContentLoaded', () => {
  loadData();
  // 목록 탭 사전 로드
  setTimeout(() => loadOutboundList(), 500);
  setTimeout(() => loadTopProducts(), 800);
});
