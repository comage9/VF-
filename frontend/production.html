<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMS - 일별 생산계획</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .filter-bar .form-control { width: auto; }
    .filter-bar .form-control[type="date"] { width: 160px; }
    .filter-bar select { width: 130px; }
    .priority-badge {
      display: inline-block;
      width: 20px; height: 20px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      line-height: 20px;
    }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress-row span { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .action-btns { display: flex; gap: 4px; }
    .planned-hours-cell { font-weight: 600; color: var(--primary); }
    .bulk-bar {
      background: #1e40af;
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      display: none;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .bulk-bar.show { display: flex; }
    .bulk-bar .ml-auto { margin-left: auto; display: flex; gap: 8px; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-title">일별 생산계획 <span>생산 스케줄 관리</span></div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" onclick="exportCSV()">
          <i class="fas fa-download"></i> 내보내기
        </button>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">
          <i class="fas fa-plus"></i> 계획 등록
        </button>
      </div>
    </header>

    <main class="content">
      <!-- 필터 바 -->
      <div class="filter-bar">
        <div class="search-bar">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="search-input" class="form-control" placeholder="제품명, 금형번호 검색..." oninput="applyFilter()">
        </div>
        <input type="date" id="filter-date-from" class="form-control" onchange="applyFilter()">
        <span style="color:var(--text-muted);font-size:12px">~</span>
        <input type="date" id="filter-date-to" class="form-control" onchange="applyFilter()">
        <select id="filter-status" class="form-control" onchange="applyFilter()">
          <option value="">전체 상태</option>
          <option value="planned">계획</option>
          <option value="in_progress">진행중</option>
          <option value="completed">완료</option>
        </select>
        <select id="filter-machine" class="form-control" onchange="applyFilter()">
          <option value="">전체 기계</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="resetFilter()">
          <i class="fas fa-undo"></i> 초기화
        </button>
        <span id="filter-count" style="font-size:12px; color:var(--text-muted); margin-left: auto;"></span>
      </div>

      <!-- 일괄 작업 바 -->
      <div class="bulk-bar" id="bulk-bar">
        <i class="fas fa-check-square"></i>
        <span id="bulk-count">0개 선택됨</span>
        <div class="ml-auto">
          <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;" onclick="bulkStatus('in_progress')">진행중으로</button>
          <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;" onclick="bulkStatus('completed')">완료 처리</button>
          <button class="btn btn-sm" style="background:rgba(220,38,38,.8);color:#fff;" onclick="bulkDelete()">삭제</button>
        </div>
      </div>

      <!-- 테이블 -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <i class="fas fa-table" style="color:var(--primary)"></i>
            생산계획 목록
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span id="page-info" style="font-size:12px;color:var(--text-muted);"></span>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:36px"><input type="checkbox" id="chk-all" onchange="toggleAll(this)"></th>
                <th onclick="sortBy('plan_date')" style="cursor:pointer">일자 ↕</th>
                <th onclick="sortBy('machine_number')" style="cursor:pointer">기계 ↕</th>
                <th>금형</th>
                <th>제품명</th>
                <th>색상</th>
                <th>롯트번호</th>
                <th class="td-right">수량(낱개)</th>
                <th class="td-right">예정시간</th>
                <th>우선순위</th>
                <th>상태</th>
                <th>비고</th>
                <th style="width:90px">작업</th>
              </tr>
            </thead>
            <tbody id="plan-tbody">
              <tr><td colspan="13"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
        <!-- 페이지네이션 -->
        <div style="padding:12px 20px; border-top:1px solid var(--border);">
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 등록/수정 모달 -->
<div class="modal-backdrop" id="plan-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">생산계획 등록</div>
      <button class="modal-close" onclick="Modal.close('plan-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">생산 일자 *</label>
          <input type="date" id="f-date" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">기계 번호 *</label>
          <select id="f-machine" class="form-control"></select>
        </div>
        <div class="form-group">
          <label class="form-label">금형 번호 *</label>
          <select id="f-mold" class="form-control" onchange="onMoldChange()"></select>
        </div>
        <div class="form-group">
          <label class="form-label">제품명(한국어)</label>
          <input type="text" id="f-name-kr" class="form-control" readonly style="background:var(--surface2)">
        </div>
        <div class="form-group">
          <label class="form-label">제품명(영문)</label>
          <input type="text" id="f-name-en" class="form-control" readonly style="background:var(--surface2)">
        </div>
        <div class="form-group">
          <label class="form-label">색상 *</label>
          <select id="f-color" class="form-control"></select>
        </div>
        <div class="form-group">
          <label class="form-label">롯트번호</label>
          <input type="text" id="f-lot" class="form-control" placeholder="예: WHITE 180">
        </div>
        <div class="form-group">
          <label class="form-label">단위(EA/LINE)</label>
          <select id="f-unit" class="form-control">
            <option value="EA">EA (개)</option>
            <option value="LINE">LINE (라인)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">생산 수량 *</label>
          <input type="number" id="f-qty" class="form-control" placeholder="0" oninput="calcHours()">
        </div>
        <div class="form-group">
          <label class="form-label">단위당 낱개 수</label>
          <input type="number" id="f-unit-per" class="form-control" value="1" oninput="calcHours()">
        </div>
        <div class="form-group">
          <label class="form-label">시간당 생산량</label>
          <input type="number" id="f-hourly" class="form-control" value="55" oninput="calcHours()">
        </div>
        <div class="form-group">
          <label class="form-label">작업예정 시간 (자동계산)</label>
          <input type="number" id="f-hours" class="form-control" readonly style="background:var(--surface2)">
        </div>
        <div class="form-group">
          <label class="form-label">우선순위</label>
          <select id="f-priority" class="form-control">
            <option value="">없음</option>
            <option value="1">1순위</option>
            <option value="2">2순위</option>
            <option value="3">3순위</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">상태</label>
          <select id="f-status" class="form-control">
            <option value="planned">계획</option>
            <option value="in_progress">진행중</option>
            <option value="completed">완료</option>
          </select>
        </div>
      </div>
      <div class="form-group mt-3">
        <label class="form-label">비고</label>
        <input type="text" id="f-remark" class="form-control" placeholder="비고 사항을 입력하세요">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('plan-modal')">취소</button>
      <button class="btn btn-primary" onclick="savePlan()">
        <i class="fas fa-save"></i> 저장
      </button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-backdrop" id="del-modal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title">삭제 확인</div>
      <button class="modal-close" onclick="Modal.close('del-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p>선택한 생산계획을 삭제하시겠습니까?</p>
      <p class="text-muted text-sm mt-2">이 작업은 되돌릴 수 없습니다.</p>
      <input type="hidden" id="del-id">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('del-modal')">취소</button>
      <button class="btn btn-danger" onclick="confirmDelete()"><i class="fas fa-trash"></i> 삭제</button>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
document.getElementById('sidebar').innerHTML = renderSidebar('production');

let allPlans = [], molds = [], colors = [], machines = [];
let filteredPlans = [];
let sortKey = 'plan_date', sortDir = 1;
let currentPage = 1;
const PAGE_SIZE = 20;
let selectedIds = new Set();

async function init() {
  const [planRes, moldRes, colorRes, machineRes] = await Promise.all([
    API.get('production_plans', { limit: 200 }),
    API.get('molds', { limit: 200 }),
    API.get('colors', { limit: 200 }),
    API.get('machines', { limit: 50 })
  ]);
  allPlans  = planRes.data || [];
  molds     = moldRes.data || [];
  colors    = colorRes.data || [];
  machines  = machineRes.data || [];

  populateSelects();
  applyFilter();
}

function populateSelects() {
  // 기계 필터 셀렉트
  const mSel = document.getElementById('filter-machine');
  machines.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.machine_number;
    opt.textContent = `${m.machine_number}호기`;
    mSel.appendChild(opt);
  });
  // 모달 기계
  const fMachine = document.getElementById('f-machine');
  fMachine.innerHTML = '<option value="">-- 선택 --</option>';
  machines.forEach(m => {
    fMachine.innerHTML += `<option value="${m.machine_number}">${m.machine_number}호기 (${m.tonnage||'-'}T)</option>`;
  });
  // 모달 금형
  const fMold = document.getElementById('f-mold');
  fMold.innerHTML = '<option value="">-- 선택 --</option>';
  molds.forEach(m => {
    fMold.innerHTML += `<option value="${m.mold_number}" data-kr="${m.product_name_kr||''}" data-en="${m.product_name_en||''}">${m.mold_number} - ${m.product_name_kr||''}</option>`;
  });
  // 모달 색상
  const fColor = document.getElementById('f-color');
  fColor.innerHTML = '<option value="">-- 선택 --</option>';
  colors.forEach(c => {
    fColor.innerHTML += `<option value="${c.color_code}">${c.color_code} (${c.color_name_kr||''})</option>`;
  });
}

function onMoldChange() {
  const sel = document.getElementById('f-mold');
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('f-name-kr').value = opt.dataset.kr || '';
  document.getElementById('f-name-en').value = opt.dataset.en || '';
  calcHours();
}

function calcHours() {
  const qty     = Number(document.getElementById('f-qty').value) || 0;
  const unitPer = Number(document.getElementById('f-unit-per').value) || 1;
  const hourly  = Number(document.getElementById('f-hourly').value) || 55;
  const planned = qty * unitPer;
  const hours   = hourly > 0 ? Math.ceil(planned / hourly) : 0;
  document.getElementById('f-hours').value = hours;
}

function applyFilter() {
  const q     = (document.getElementById('search-input').value||'').toLowerCase();
  const from  = document.getElementById('filter-date-from').value;
  const to    = document.getElementById('filter-date-to').value;
  const stat  = document.getElementById('filter-status').value;
  const mach  = document.getElementById('filter-machine').value;

  filteredPlans = allPlans.filter(p => {
    const d = (p.plan_date||'').substring(0,10);
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    if (stat && p.status !== stat) return false;
    if (mach && String(p.machine_number) !== String(mach)) return false;
    if (q) {
      const haystack = [p.product_name_kr, p.product_name_en, String(p.mold_number), p.color, p.lot_number].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  // 정렬
  filteredPlans.sort((a,b) => {
    let va = a[sortKey]||'', vb = b[sortKey]||'';
    if (!isNaN(va) && !isNaN(vb)) { va = Number(va); vb = Number(vb); }
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });

  document.getElementById('filter-count').textContent = `총 ${filteredPlans.length}건`;
  currentPage = 1;
  renderTable();
  renderPagination();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  applyFilter();
}

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filteredPlans.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('plan-tbody');

  if (page.length === 0) {
    tbody.innerHTML = `<tr><td colspan="13">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <h3>생산계획이 없습니다</h3>
        <p>새로운 생산계획을 등록해보세요</p>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = page.map(p => {
    const checked = selectedIds.has(p.id) ? 'checked' : '';
    const priBadge = p.priority ? `<span class="priority-badge">${p.priority}</span>` : '';
    return `
      <tr>
        <td><input type="checkbox" ${checked} onchange="toggleSelect('${p.id}',this)"></td>
        <td>${DateUtil.fmt(p.plan_date)}</td>
        <td><span class="badge badge-blue">${p.machine_number}호</span></td>
        <td style="font-weight:600;">${p.mold_number||'-'}</td>
        <td>
          <div style="font-weight:600;">${p.product_name_kr||'-'}</div>
          <div style="font-size:11px;color:var(--text-muted)">${p.product_name_en||''}</div>
        </td>
        <td><span class="badge badge-gray">${p.color||'-'}</span></td>
        <td style="font-size:12px;color:var(--text-muted)">${p.lot_number||'-'}</td>
        <td class="td-right td-num">${NumUtil.fmt(p.planned_qty)}</td>
        <td class="td-center planned-hours-cell">${p.planned_hours||'-'}h</td>
        <td class="td-center">${priBadge || '-'}</td>
        <td>${StatusUtil.badge(p.status)}</td>
        <td style="font-size:12px;color:var(--text-muted);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.remark||''}</td>
        <td>
          <div class="action-btns">
            <button class="btn btn-secondary btn-icon btn-sm" title="수정" onclick="openEditModal('${p.id}')">
              <i class="fas fa-edit" style="font-size:11px"></i>
            </button>
            <button class="btn btn-danger btn-icon btn-sm" title="삭제" onclick="openDeleteModal('${p.id}')">
              <i class="fas fa-trash" style="font-size:11px"></i>
            </button>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  document.getElementById('page-info').textContent =
    `${start+1} - ${Math.min(start+PAGE_SIZE, filteredPlans.length)} / ${filteredPlans.length}건`;
}

function renderPagination() {
  const total = Math.ceil(filteredPlans.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML=''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i=1; i<=total; i++) {
    if (i===1||i===total||Math.abs(i-currentPage)<=2) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i-currentPage)===3) {
      html += `<span style="padding:0 4px;color:var(--text-muted)">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(n) {
  const total = Math.ceil(filteredPlans.length / PAGE_SIZE);
  if (n < 1 || n > total) return;
  currentPage = n;
  renderTable();
  renderPagination();
}

function toggleAll(chk) {
  const page = filteredPlans.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  page.forEach(p => chk.checked ? selectedIds.add(p.id) : selectedIds.delete(p.id));
  renderTable();
  updateBulkBar();
}
function toggleSelect(id, chk) {
  chk.checked ? selectedIds.add(id) : selectedIds.delete(id);
  updateBulkBar();
}
function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  if (selectedIds.size > 0) {
    bar.classList.add('show');
    document.getElementById('bulk-count').textContent = `${selectedIds.size}개 선택됨`;
  } else {
    bar.classList.remove('show');
  }
}

async function bulkStatus(status) {
  if (!selectedIds.size) return;
  try {
    await Promise.all([...selectedIds].map(id => API.patch('production_plans', id, { status })));
    Toast.success(`${selectedIds.size}건 상태 변경 완료`);
    selectedIds.clear();
    updateBulkBar();
    await refreshPlans();
  } catch(e) { Toast.error('일괄 처리 실패'); }
}
async function bulkDelete() {
  if (!selectedIds.size) return;
  if (!confirm(`${selectedIds.size}건을 삭제하시겠습니까?`)) return;
  try {
    await Promise.all([...selectedIds].map(id => API.delete('production_plans', id)));
    Toast.success(`${selectedIds.size}건 삭제 완료`);
    selectedIds.clear();
    updateBulkBar();
    await refreshPlans();
  } catch(e) { Toast.error('일괄 삭제 실패'); }
}

async function refreshPlans() {
  const res = await API.get('production_plans', { limit: 200 });
  allPlans = res.data || [];
  applyFilter();
}

function resetFilter() {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-date-from').value = '';
  document.getElementById('filter-date-to').value = '';
  document.getElementById('filter-status').value = '';
  document.getElementById('filter-machine').value = '';
  applyFilter();
}

function openAddModal() {
  document.getElementById('modal-title').textContent = '생산계획 등록';
  document.getElementById('edit-id').value = '';
  document.getElementById('f-date').value = DateUtil.today();
  document.getElementById('f-machine').value = '';
  document.getElementById('f-mold').value = '';
  document.getElementById('f-name-kr').value = '';
  document.getElementById('f-name-en').value = '';
  document.getElementById('f-color').value = '';
  document.getElementById('f-lot').value = '';
  document.getElementById('f-unit').value = 'EA';
  document.getElementById('f-qty').value = '';
  document.getElementById('f-unit-per').value = '1';
  document.getElementById('f-hourly').value = '55';
  document.getElementById('f-hours').value = '';
  document.getElementById('f-priority').value = '';
  document.getElementById('f-status').value = 'planned';
  document.getElementById('f-remark').value = '';
  Modal.open('plan-modal');
}

function openEditModal(id) {
  const p = allPlans.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal-title').textContent = '생산계획 수정';
  document.getElementById('edit-id').value = p.id;
  document.getElementById('f-date').value = (p.plan_date||'').substring(0,10);
  document.getElementById('f-machine').value = p.machine_number||'';
  document.getElementById('f-mold').value = p.mold_number||'';
  document.getElementById('f-name-kr').value = p.product_name_kr||'';
  document.getElementById('f-name-en').value = p.product_name_en||'';
  document.getElementById('f-color').value = p.color||'';
  document.getElementById('f-lot').value = p.lot_number||'';
  document.getElementById('f-unit').value = p.unit||'EA';
  document.getElementById('f-qty').value = p.qty||'';
  document.getElementById('f-unit-per').value = p.unit_per_set||1;
  document.getElementById('f-hourly').value = p.hourly_output||55;
  document.getElementById('f-hours').value = p.planned_hours||'';
  document.getElementById('f-priority').value = p.priority||'';
  document.getElementById('f-status').value = p.status||'planned';
  document.getElementById('f-remark').value = p.remark||'';
  Modal.open('plan-modal');
}

function openDeleteModal(id) {
  document.getElementById('del-id').value = id;
  Modal.open('del-modal');
}

async function confirmDelete() {
  const id = document.getElementById('del-id').value;
  try {
    await API.delete('production_plans', id);
    Toast.success('삭제되었습니다.');
    Modal.close('del-modal');
    await refreshPlans();
  } catch(e) { Toast.error('삭제 실패: ' + e.message); }
}

async function savePlan() {
  const id = document.getElementById('edit-id').value;
  const data = {
    plan_date:      document.getElementById('f-date').value,
    machine_number: document.getElementById('f-machine').value,
    mold_number:    Number(document.getElementById('f-mold').value) || 0,
    product_name_kr:document.getElementById('f-name-kr').value,
    product_name_en:document.getElementById('f-name-en').value,
    color:          document.getElementById('f-color').value,
    lot_number:     document.getElementById('f-lot').value,
    unit:           document.getElementById('f-unit').value,
    qty:            Number(document.getElementById('f-qty').value) || 0,
    unit_per_set:   Number(document.getElementById('f-unit-per').value) || 1,
    hourly_output:  Number(document.getElementById('f-hourly').value) || 55,
    planned_qty:    (Number(document.getElementById('f-qty').value)||0) * (Number(document.getElementById('f-unit-per').value)||1),
    planned_hours:  Number(document.getElementById('f-hours').value) || 0,
    priority:       document.getElementById('f-priority').value,
    status:         document.getElementById('f-status').value,
    remark:         document.getElementById('f-remark').value,
  };
  if (!data.plan_date || !data.machine_number || !data.mold_number) {
    Toast.warning('일자, 기계번호, 금형번호는 필수입니다.');
    return;
  }
  try {
    if (id) {
      await API.put('production_plans', id, data);
      Toast.success('수정되었습니다.');
    } else {
      await API.post('production_plans', data);
      Toast.success('등록되었습니다.');
    }
    Modal.close('plan-modal');
    await refreshPlans();
  } catch(e) { Toast.error('저장 실패: ' + e.message); }
}

function exportCSV() {
  const headers = ['일자','기계','금형','제품명(KR)','제품명(EN)','색상','롯트번호','수량','예정시간','우선순위','상태','비고'];
  const rows = filteredPlans.map(p => [
    p.plan_date, p.machine_number, p.mold_number, p.product_name_kr, p.product_name_en,
    p.color, p.lot_number, p.planned_qty, p.planned_hours, p.priority, p.status, p.remark
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${c||''}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `생산계획_${DateUtil.today()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  Toast.success('CSV 내보내기 완료');
}

document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

init();
