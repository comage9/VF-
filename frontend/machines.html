<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMS - 기계 관리</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    .machine-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; margin-bottom:24px; }
    .mc-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      transition:all .2s;
      position:relative;
      overflow:hidden;
    }
    .mc-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-2px); }
    .mc-card.active  { border-left:4px solid var(--success); }
    .mc-card.inactive{ border-left:4px solid var(--danger); }
    .mc-card.maintenance { border-left:4px solid var(--warning); }
    .mc-number { font-size:32px; font-weight:900; color:var(--primary); line-height:1; }
    .mc-info { margin-top:8px; font-size:12px; color:var(--text-muted); display:flex; flex-direction:column; gap:3px; }
    .mc-actions { position:absolute; top:12px; right:12px; display:flex; gap:4px; opacity:0; transition:opacity .2s; }
    .mc-card:hover .mc-actions { opacity:1; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-title">기계 관리 <span>기계 마스터 데이터</span></div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">
          <i class="fas fa-plus"></i> 기계 등록
        </button>
      </div>
    </header>

    <main class="content">
      <!-- 통계 -->
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-industry"></i></div>
          <div class="stat-info"><div class="stat-label">전체 기계</div><div class="stat-value" id="s-total">-</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-play-circle"></i></div>
          <div class="stat-info"><div class="stat-label">가동중</div><div class="stat-value" id="s-active">-</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red"><i class="fas fa-stop-circle"></i></div>
          <div class="stat-info"><div class="stat-label">비가동</div><div class="stat-value" id="s-inactive">-</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon amber"><i class="fas fa-tools"></i></div>
          <div class="stat-info"><div class="stat-label">정비중</div><div class="stat-value" id="s-maint">-</div></div>
        </div>
      </div>

      <!-- 카드 뷰 -->
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="fas fa-cogs" style="color:var(--primary)"></i> 기계 현황</div>
        </div>
        <div class="card-body">
          <div class="machine-cards" id="machine-cards">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- 상세 테이블 -->
      <div class="card mt-4">
        <div class="card-header">
          <div class="card-title"><i class="fas fa-table" style="color:var(--secondary)"></i> 기계 목록</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>기계번호</th>
                <th class="td-right">톤수(T)</th>
                <th>교대 유형</th>
                <th>상태</th>
                <th style="width:80px">작업</th>
              </tr>
            </thead>
            <tbody id="mc-tbody">
              <tr><td colspan="5"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 등록/수정 모달 -->
<div class="modal-backdrop" id="mc-modal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <div class="modal-title" id="mc-modal-title">기계 등록</div>
      <button class="modal-close" onclick="Modal.close('mc-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="mc-edit-id">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">기계 번호 *</label>
          <input type="text" id="mc-f-num" class="form-control" placeholder="예: 11">
        </div>
        <div class="form-group">
          <label class="form-label">톤수(T)</label>
          <input type="number" id="mc-f-tonnage" class="form-control" placeholder="예: 300">
        </div>
        <div class="form-group">
          <label class="form-label">교대 유형</label>
          <select id="mc-f-shift" class="form-control">
            <option value="1교대">1교대</option>
            <option value="2교대">2교대</option>
            <option value="3교대">3교대</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">상태</label>
          <select id="mc-f-status" class="form-control">
            <option value="active">가동중</option>
            <option value="inactive">비가동</option>
            <option value="maintenance">정비중</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('mc-modal')">취소</button>
      <button class="btn btn-primary" onclick="saveMachine()"><i class="fas fa-save"></i> 저장</button>
    </div>
  </div>
</div>

<!-- 삭제 모달 -->
<div class="modal-backdrop" id="del-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header"><div class="modal-title">삭제 확인</div>
      <button class="modal-close" onclick="Modal.close('del-modal')">✕</button></div>
    <div class="modal-body"><p>이 기계 정보를 삭제하시겠습니까?</p><input type="hidden" id="del-id"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('del-modal')">취소</button>
      <button class="btn btn-danger" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
document.getElementById('sidebar').innerHTML = renderSidebar('machines');

let allMachines = [];

async function init() {
  const res = await API.get('machines', { limit: 50 });
  allMachines = (res.data||[]).sort((a,b)=>Number(a.machine_number)-Number(b.machine_number));
  renderStats();
  renderCards();
  renderTable();
}

function renderStats() {
  const total  = allMachines.length;
  const active = allMachines.filter(m=>m.status==='active').length;
  const inact  = allMachines.filter(m=>m.status==='inactive').length;
  const maint  = allMachines.filter(m=>m.status==='maintenance').length;
  document.getElementById('s-total').textContent  = total;
  document.getElementById('s-active').textContent = active;
  document.getElementById('s-inactive').textContent = inact;
  document.getElementById('s-maint').textContent  = maint;
}

function renderCards() {
  const el = document.getElementById('machine-cards');
  if (allMachines.length===0) {
    el.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚙️</div><h3>기계 정보가 없습니다</h3></div>`;
    return;
  }
  const statusLabel = { active:'가동중', inactive:'비가동', maintenance:'정비중' };
  const statusCls   = { active:'badge-green', inactive:'badge-red', maintenance:'badge-amber' };
  el.innerHTML = allMachines.map(m => `
    <div class="mc-card ${m.status||'active'}">
      <div class="mc-actions">
        <button class="btn btn-secondary btn-icon btn-sm" onclick="openEditModal('${m.id}')"><i class="fas fa-edit" style="font-size:11px"></i></button>
        <button class="btn btn-danger btn-icon btn-sm" onclick="openDeleteModal('${m.id}')"><i class="fas fa-trash" style="font-size:11px"></i></button>
      </div>
      <div class="mc-number">${m.machine_number}호</div>
      <div class="mc-info">
        <span>📏 ${m.tonnage||'-'} 톤</span>
        <span>🔄 ${m.shift_type||'-'}</span>
        <span class="mt-1"><span class="badge ${statusCls[m.status]||'badge-gray'}">${statusLabel[m.status]||m.status}</span></span>
      </div>
    </div>
  `).join('');
}

function renderTable() {
  const tbody = document.getElementById('mc-tbody');
  if (allMachines.length===0) {
    tbody.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">기계 정보 없음</td></tr>`;
    return;
  }
  tbody.innerHTML = allMachines.map(m => `
    <tr>
      <td style="font-weight:700;font-size:16px;color:var(--primary)">${m.machine_number}호기</td>
      <td class="td-right td-num">${m.tonnage||'-'} T</td>
      <td>${m.shift_type||'-'}</td>
      <td>${StatusUtil.badge(m.status||'active')}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-secondary btn-icon btn-sm" onclick="openEditModal('${m.id}')"><i class="fas fa-edit" style="font-size:11px"></i></button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="openDeleteModal('${m.id}')"><i class="fas fa-trash" style="font-size:11px"></i></button>
        </div>
      </td>
    </tr>
  `).join('');
}

function openAddModal() {
  document.getElementById('mc-modal-title').textContent='기계 등록';
  document.getElementById('mc-edit-id').value='';
  document.getElementById('mc-f-num').value='';
  document.getElementById('mc-f-tonnage').value='';
  document.getElementById('mc-f-shift').value='2교대';
  document.getElementById('mc-f-status').value='active';
  Modal.open('mc-modal');
}

function openEditModal(id) {
  const m = allMachines.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('mc-modal-title').textContent='기계 수정';
  document.getElementById('mc-edit-id').value=m.id;
  document.getElementById('mc-f-num').value=m.machine_number||'';
  document.getElementById('mc-f-tonnage').value=m.tonnage||'';
  document.getElementById('mc-f-shift').value=m.shift_type||'2교대';
  document.getElementById('mc-f-status').value=m.status||'active';
  Modal.open('mc-modal');
}

function openDeleteModal(id) {
  document.getElementById('del-id').value=id;
  Modal.open('del-modal');
}

async function confirmDelete() {
  const id = document.getElementById('del-id').value;
  try {
    await API.delete('machines', id);
    Toast.success('삭제되었습니다.');
    Modal.close('del-modal');
    const res = await API.get('machines',{limit:50});
    allMachines = (res.data||[]).sort((a,b)=>Number(a.machine_number)-Number(b.machine_number));
    renderStats(); renderCards(); renderTable();
  } catch(e) { Toast.error('삭제 실패'); }
}

async function saveMachine() {
  const id = document.getElementById('mc-edit-id').value;
  const data = {
    machine_number: document.getElementById('mc-f-num').value.trim(),
    tonnage:        Number(document.getElementById('mc-f-tonnage').value)||0,
    shift_type:     document.getElementById('mc-f-shift').value,
    status:         document.getElementById('mc-f-status').value,
  };
  if (!data.machine_number) { Toast.warning('기계 번호는 필수입니다.'); return; }
  try {
    if (id) { await API.put('machines', id, data); Toast.success('수정되었습니다.'); }
    else     { await API.post('machines', data);   Toast.success('등록되었습니다.'); }
    Modal.close('mc-modal');
    const res = await API.get('machines',{limit:50});
    allMachines = (res.data||[]).sort((a,b)=>Number(a.machine_number)-Number(b.machine_number));
    renderStats(); renderCards(); renderTable();
  } catch(e) { Toast.error('저장 실패'); }
}

document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('open'); });
});
init();
</script>
</body>
</html>
