<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>통합 대시보드 - BONO PMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    /* ── 섹션 헤더 ── */
    .dash-section {
      display: flex; align-items: center; justify-content: space-between;
      margin: 0 0 14px;
    }
    .dash-section-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 700; color: var(--text);
    }
    .ds-icon {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .ds-icon.blue   { background:#eff6ff; color:#2563eb; }
    .ds-icon.green  { background:#f0fdf4; color:#16a34a; }
    .ds-icon.amber  { background:#fffbeb; color:#d97706; }
    .dash-section-link {
      font-size: 12px; color: var(--primary); text-decoration: none;
      display: flex; align-items: center; gap: 3px; font-weight: 500;
      opacity: .75;
    }
    .dash-section-link:hover { opacity: 1; text-decoration: underline; }

    /* ── KPI 카드 행 ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px; margin-bottom: 32px;
    }
    .kpi-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 18px 20px;
      box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px;
    }
    .kpi-card-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .kpi-card-icon.blue   { background:#eff6ff; color:#2563eb; }
    .kpi-card-icon.green  { background:#f0fdf4; color:#16a34a; }
    .kpi-card-icon.amber  { background:#fffbeb; color:#d97706; }
    .kpi-card-icon.red    { background:#fef2f2; color:#dc2626; }
    .kpi-card-icon.teal   { background:#f0fdfa; color:#0f766e; }
    .kpi-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .kpi-value { font-size: 24px; font-weight: 800; color: var(--text); line-height: 1.1; }
    .kpi-sub   { font-size: 11px; color: var(--text-light); margin-top: 3px; }

    /* ── 재고 상태 칩 ── */
    .stock-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 14px; margin-bottom: 32px;
    }
    .stock-chip {
      border-radius: var(--radius-sm); padding: 16px 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .stock-chip.red   { background:#fef2f2; border:1px solid #fecaca; }
    .stock-chip.amber { background:#fffbeb; border:1px solid #fde68a; }
    .stock-chip.green { background:#f0fdf4; border:1px solid #bbf7d0; }
    .stock-chip.blue  { background:#eff6ff; border:1px solid #bfdbfe; }
    .sc-icon { font-size: 22px; flex-shrink: 0; }
    .sc-val  { font-size: 26px; font-weight: 800; }
    .stock-chip.red   .sc-val { color:#dc2626; }
    .stock-chip.amber .sc-val { color:#d97706; }
    .stock-chip.green .sc-val { color:#16a34a; }
    .stock-chip.blue  .sc-val { color:#2563eb; }
    .sc-lbl  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── 생산 요약 칩 ── */
    .prod-row {
      display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 14px; margin-bottom: 32px;
    }
    .prod-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px 18px;
      box-shadow: var(--shadow); text-align: center;
    }
    .pc-val { font-size: 28px; font-weight: 800; color: var(--text); }
    .pc-lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .pc-bar { height: 4px; border-radius: 2px; margin-top: 10px; background: var(--border); overflow: hidden; }
    .pc-bar-fill        { height: 100%; border-radius: 2px; }
    .pc-bar-fill.blue   { background:#3b82f6; }
    .pc-bar-fill.amber  { background:#f59e0b; }
    .pc-bar-fill.green  { background:#22c55e; }
    .pc-bar-fill.teal   { background:#14b8a6; }
    .pc-bar-fill.purple { background:#a855f7; }

    /* ── 하단 2컬럼 ── */
    .dash-bottom {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ── 기계 현황 칩 ── */
    .machine-bar {
      display: flex; align-items: center; gap: 16px;
      padding: 0 0 14px; border-bottom: 1px solid var(--border);
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .ms-stat { text-align: center; min-width: 56px; }
    .ms-val  { font-size: 26px; font-weight: 800; }
    .ms-lbl  { font-size: 11px; color: var(--text-muted); }
    .ms-stat.active .ms-val { color:#16a34a; }
    .ms-stat.stop   .ms-val { color:#dc2626; }
    .ms-stat.total  .ms-val { color:var(--primary); }
    .ms-div  { width:1px; height:36px; background:var(--border); flex-shrink:0; }
    .ms-chips { display:flex; flex-wrap:wrap; gap:6px; flex:1; }
    .ms-chip {
      font-size:11px; font-weight:600; border-radius:6px;
      padding:4px 10px; border:1px solid;
    }
    .ms-chip.on  { background:#f0fdf4; border-color:#86efac; color:#15803d; }
    .ms-chip.off { background:#fef2f2; border-color:#fca5a5; color:#dc2626; }

    /* ── 최근 생산계획 리스트 ── */
    .recent-item {
      display:flex; align-items:center; gap:10px;
      padding:9px 0; border-bottom:1px solid var(--border); font-size:12px;
    }
    .recent-item:last-child { border:none; padding-bottom:0; }
    .ri-date    { color:var(--text-muted); width:38px; flex-shrink:0; }
    .ri-machine { color:var(--text-muted); width:28px; flex-shrink:0; text-align:center; }
    .ri-name    { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; }
    .ri-qty     { font-weight:700; color:var(--primary); white-space:nowrap; }

    /* ── 반응형 ── */
    @media (max-width:1200px) {
      .kpi-row  { grid-template-columns: repeat(3,1fr); }
      .prod-row { grid-template-columns: repeat(3,1fr); }
    }
    @media (max-width:900px) {
      .kpi-row   { grid-template-columns: repeat(2,1fr); }
      .stock-row { grid-template-columns: repeat(2,1fr); }
      .prod-row  { grid-template-columns: repeat(2,1fr); }
      .dash-bottom { grid-template-columns: 1fr; }
    }
    @media (max-width:600px) {
      .kpi-row   { grid-template-columns: repeat(2,1fr); }
      .stock-row { grid-template-columns: repeat(2,1fr); }
      .prod-row  { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar" data-page="dashboard"></aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-title">통합 대시보드 <span>BONO 운영 현황 한눈에 보기</span></div>
      <div class="topbar-actions">
        <span id="today-date" style="font-size:13px;color:var(--text-muted);"></span>
        <button class="btn btn-primary btn-sm" onclick="location.href='production.html'">
          <i class="fas fa-plus"></i> 생산계획 등록
        </button>
      </div>
    </header>

    <main class="content">

      <!-- ① 영업·출고 KPI -->
      <div class="dash-section">
        <div class="dash-section-title">
          <span class="ds-icon blue"><i class="fas fa-store"></i></span>
          영업·출고 현황
          <small style="font-weight:400;color:var(--text-muted);font-size:12px;">최근 30일</small>
        </div>
        <a href="outbound.html" class="dash-section-link">상세보기 <i class="fas fa-chevron-right" style="font-size:10px;"></i></a>
      </div>
      <div class="kpi-row">
        <div class="kpi-card">
          <div class="kpi-card-icon blue"><i class="fas fa-box"></i></div>
          <div>
            <div class="kpi-label">누적 출고 건수</div>
            <div class="kpi-value" id="vf-count">-</div>
            <div class="kpi-sub">전체 기록</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card-icon green"><i class="fas fa-cubes"></i></div>
          <div>
            <div class="kpi-label">30일 출고량</div>
            <div class="kpi-value" id="vf-qty30">-</div>
            <div class="kpi-sub">개</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card-icon amber"><i class="fas fa-won-sign"></i></div>
          <div>
            <div class="kpi-label">30일 매출액</div>
            <div class="kpi-value" id="vf-sales30">-</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card-icon teal"><i class="fas fa-calendar-day"></i></div>
          <div>
            <div class="kpi-label">일 평균 출고</div>
            <div class="kpi-value" id="vf-avg">-</div>
            <div class="kpi-sub">개/일</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card-icon red"><i class="fas fa-exclamation-circle"></i></div>
          <div>
            <div class="kpi-label">재고 경보</div>
            <div class="kpi-value" id="vf-stock-alert">-</div>
            <div class="kpi-sub">부족·소진 SKU</div>
          </div>
        </div>
      </div>

      <!-- ② 재고 현황 -->
      <div class="dash-section">
        <div class="dash-section-title">
          <span class="ds-icon green"><i class="fas fa-warehouse"></i></span>
          재고 현황
        </div>
        <a href="inventory.html" class="dash-section-link">상세보기 <i class="fas fa-chevron-right" style="font-size:10px;"></i></a>
      </div>
      <div class="stock-row">
        <div class="stock-chip red">
          <span class="sc-icon">❌</span>
          <div><div class="sc-val" id="al-out">-</div><div class="sc-lbl">재고 없음 (SKU)</div></div>
        </div>
        <div class="stock-chip amber">
          <span class="sc-icon">⚠️</span>
          <div><div class="sc-val" id="al-low">-</div><div class="sc-lbl">재고 부족 (SKU)</div></div>
        </div>
        <div class="stock-chip green">
          <span class="sc-icon">✅</span>
          <div><div class="sc-val" id="al-normal">-</div><div class="sc-lbl">정상 재고 (SKU)</div></div>
        </div>
        <div class="stock-chip blue">
          <span class="sc-icon">📦</span>
          <div><div class="sc-val" id="al-total-qty">-</div><div class="sc-lbl">총 재고량 (개)</div></div>
        </div>
      </div>

      <!-- ③ 생산 관리 현황 -->
      <div class="dash-section">
        <div class="dash-section-title">
          <span class="ds-icon amber"><i class="fas fa-industry"></i></span>
          생산 관리 현황
        </div>
        <a href="production.html" class="dash-section-link">상세보기 <i class="fas fa-chevron-right" style="font-size:10px;"></i></a>
      </div>
      <div class="prod-row">
        <div class="prod-chip">
          <div class="pc-val" id="stat-total">-</div>
          <div class="pc-lbl">전체 계획</div>
          <div class="pc-bar"><div class="pc-bar-fill blue" style="width:100%"></div></div>
        </div>
        <div class="prod-chip">
          <div class="pc-val" id="stat-planned">-</div>
          <div class="pc-lbl">계획 대기</div>
          <div class="pc-bar"><div class="pc-bar-fill blue" id="bar-planned" style="width:0%"></div></div>
        </div>
        <div class="prod-chip">
          <div class="pc-val" id="stat-inprogress">-</div>
          <div class="pc-lbl">진행 중</div>
          <div class="pc-bar"><div class="pc-bar-fill amber" id="bar-inprogress" style="width:0%"></div></div>
        </div>
        <div class="prod-chip">
          <div class="pc-val" id="stat-completed">-</div>
          <div class="pc-lbl">완료</div>
          <div class="pc-bar"><div class="pc-bar-fill green" id="bar-completed" style="width:0%"></div></div>
        </div>
        <div class="prod-chip">
          <div class="pc-val" id="stat-qty">-</div>
          <div class="pc-lbl">총 생산 수량</div>
          <div class="pc-bar"><div class="pc-bar-fill teal" style="width:100%"></div></div>
        </div>
        <div class="prod-chip">
          <div class="pc-val" id="stat-molds">-</div>
          <div class="pc-lbl">등록 금형</div>
          <div class="pc-bar"><div class="pc-bar-fill purple" style="width:100%"></div></div>
        </div>
      </div>

      <!-- ④ 기계 현황 + 최근 생산계획 -->
      <div class="dash-bottom">

        <div class="card" style="margin-bottom:0;">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-industry" style="color:#f59e0b;"></i> 기계 현황</div>
            <a href="machines.html" class="btn btn-secondary btn-sm">관리</a>
          </div>
          <div class="card-body" style="padding:16px 20px;">
            <div class="machine-bar">
              <div class="ms-stat total"><div class="ms-val" id="ms-total">-</div><div class="ms-lbl">전체</div></div>
              <div class="ms-div"></div>
              <div class="ms-stat active"><div class="ms-val" id="ms-active">-</div><div class="ms-lbl">가동 중</div></div>
              <div class="ms-div"></div>
              <div class="ms-stat stop"><div class="ms-val" id="ms-stop">-</div><div class="ms-lbl">정지</div></div>
              <div class="ms-div"></div>
              <div class="ms-chips" id="ms-chips"><span style="color:var(--text-light);font-size:12px;">로딩 중…</span></div>
            </div>
          </div>
        </div>

        <div class="card" style="margin-bottom:0;">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-clock" style="color:#3b82f6;"></i> 최근 생산계획</div>
            <a href="production.html" class="btn btn-secondary btn-sm">전체보기</a>
          </div>
          <div class="card-body" style="padding:12px 20px;">
            <div id="recent-list"><div class="spinner"></div></div>
          </div>
        </div>

      </div>

    </main>
  </div>
</div>

<script src="js/common.js"></script>
<script>
async function loadVFData() {
  try {
    const [statsData, invData] = await Promise.all([
      VF_API.outboundStats(30, 'day'),
      VF_API.inventory({ limit: 2000 })
    ]);
    const s     = statsData.summary || {};
    const trend = (statsData.dailyTrend || statsData.trend || []).filter(d => {
      const dt = new Date(d.date || d.outboundDate || '');
      return !isNaN(dt.getTime()) && dt.getFullYear() > 2000;
    });
    const qty30 = trend.reduce((s,d) => s + (Number(d.quantity)||0), 0);
    const sal30 = trend.reduce((s,d) => s + (Number(d.salesAmount ?? d.sales_amount ?? 0)), 0);
    const avg   = trend.length ? Math.round(qty30 / trend.length) : 0;

    document.getElementById('vf-count').textContent   = NumUtil.fmt(s.totalCount);
    document.getElementById('vf-qty30').textContent   = NumUtil.fmt(qty30);
    document.getElementById('vf-sales30').textContent = NumUtil.fmtKRW(sal30);
    document.getElementById('vf-avg').textContent     = NumUtil.fmt(avg);

    const invRows  = Array.isArray(invData) ? invData : (invData.data || []);
    const outCount = invRows.filter(r => r.stockStatus==='out' || Number(r.currentStock)===0).length;
    const lowCount = invRows.filter(r => r.stockStatus==='low').length;
    const normCount= invRows.filter(r => r.stockStatus==='normal').length;
    const totalQty = invRows.reduce((s,r) => s+(Number(r.currentStock)||0), 0);

    document.getElementById('vf-stock-alert').textContent = NumUtil.fmt(outCount + lowCount);
    document.getElementById('al-out').textContent         = NumUtil.fmt(outCount);
    document.getElementById('al-low').textContent         = NumUtil.fmt(lowCount);
    document.getElementById('al-normal').textContent      = NumUtil.fmt(normCount);
    document.getElementById('al-total-qty').textContent   = NumUtil.fmt(totalQty);
  } catch(e) { console.warn('VF API 실패:', e.message); }
}

async function loadPMSData() {
  try {
    const [planRes, moldRes, machineRes] = await Promise.all([
      API.get('production_plans', { limit: 200 }),
      API.get('molds',    { limit: 200 }),
      API.get('machines', { limit: 50  })
    ]);
    const plans    = planRes.data    || [];
    const molds    = moldRes.data    || [];
    const machines = machineRes.data || [];
    const total    = plans.length;
    const planned  = plans.filter(p=>p.status==='planned').length;
    const inprog   = plans.filter(p=>p.status==='in_progress').length;
    const completed= plans.filter(p=>p.status==='completed').length;
    const totalQty = plans.reduce((s,p)=>s+(Number(p.planned_qty)||0),0);

    document.getElementById('stat-total').textContent      = NumUtil.fmt(total);
    document.getElementById('stat-planned').textContent    = NumUtil.fmt(planned);
    document.getElementById('stat-inprogress').textContent = NumUtil.fmt(inprog);
    document.getElementById('stat-completed').textContent  = NumUtil.fmt(completed);
    document.getElementById('stat-qty').textContent        = NumUtil.fmt(totalQty);
    document.getElementById('stat-molds').textContent      = NumUtil.fmt(molds.length);

    if (total > 0) {
      document.getElementById('bar-planned').style.width    = Math.round(planned/total*100)+'%';
      document.getElementById('bar-inprogress').style.width = Math.round(inprog/total*100)+'%';
      document.getElementById('bar-completed').style.width  = Math.round(completed/total*100)+'%';
    }

    // 기계 현황
    const activeM = machines.filter(m=>m.status==='active');
    const stopM   = machines.filter(m=>m.status!=='active');
    document.getElementById('ms-total').textContent  = machines.length;
    document.getElementById('ms-active').textContent = activeM.length;
    document.getElementById('ms-stop').textContent   = stopM.length;
    document.getElementById('ms-chips').innerHTML = machines.length
      ? machines.map(m=>`<span class="ms-chip ${m.status==='active'?'on':'off'}">${m.machine_number||'-'}${m.tonnage?'·'+m.tonnage+'T':''}</span>`).join('')
      : '<span style="color:var(--text-light);font-size:12px;">기계 정보 없음</span>';

    // 최근 생산계획 7건
    const recent = [...plans].sort((a,b)=>
      String(b.created_at||b.plan_date||'').localeCompare(String(a.created_at||a.plan_date||''))
    ).slice(0,7);

    document.getElementById('recent-list').innerHTML = recent.length
      ? recent.map(p=>`
          <div class="recent-item">
            <span class="ri-date">${DateUtil.fmtShort(p.plan_date)}</span>
            <span class="ri-machine">${p.machine_number||'-'}</span>
            <span class="ri-name" title="${p.product_name_kr||''}">${p.product_name_kr||p.product_name_en||'-'}</span>
            <span class="ri-qty">${NumUtil.fmt(p.planned_qty)}</span>
            <span class="badge badge-${p.status}" style="font-size:10px;">${StatusUtil.labels[p.status]||p.status}</span>
          </div>`).join('')
      : '<div style="text-align:center;color:#94a3b8;padding:24px;font-size:12px;">등록된 생산계획이 없습니다</div>';

  } catch(e) { console.warn('PMS 데이터 실패:', e.message); }
}

document.addEventListener('DOMContentLoaded', () => {
  loadVFData();
  loadPMSData();
});
</script>
</body>
</html>
