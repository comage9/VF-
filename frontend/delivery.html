<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배송 관리 - BONO PMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .filter-row {
      display: flex; gap: 10px; flex-wrap: wrap;
      align-items: center; margin-bottom: 20px;
    }
    .chart-grid-2 {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 20px; margin-bottom: 24px;
    }
    .chart-box { height: 280px; position: relative; }
    .detail-drawer {
      position: fixed; right: 0; top: 0; bottom: 0; width: 420px;
      background: var(--surface); border-left: 1px solid var(--border);
      box-shadow: -4px 0 20px rgba(0,0,0,.12);
      transform: translateX(100%);
      transition: transform .3s ease;
      z-index: 300; overflow-y: auto;
    }
    .detail-drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 18px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .drawer-body { padding: 22px; }
    .detail-row {
      display: flex; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .detail-row:last-child { border: none; }
    .detail-label { color: var(--text-muted); min-width: 90px; flex-shrink: 0; font-weight: 500; }
    .detail-value { color: var(--text); font-weight: 600; word-break: break-all; }
    .barcode-display {
      background: #fff; border: 1px solid var(--border);
      border-radius: 8px; padding: 16px; text-align: center;
      margin: 12px 0;
    }
    .barcode-text {
      font-family: 'Courier New', monospace;
      font-size: 16px; font-weight: 700;
      letter-spacing: 2px; color: var(--text);
    }
    .barcode-bars {
      display: flex; gap: 1px; justify-content: center;
      align-items: flex-end; height: 50px; margin: 8px 0;
    }
    .barcode-bar { background: #000; width: 2px; }
    @media (max-width: 900px) {
      .chart-grid-2 { grid-template-columns: 1fr; }
      .detail-drawer { width: 100%; }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar" data-page="delivery"></aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-title">배송 관리 <span>출고·배송 내역 조회</span></div>
      <div class="topbar-actions">
        <span id="today-date" style="font-size:13px;color:var(--text-muted);"></span>
        <button class="btn btn-secondary btn-sm" onclick="exportCSV()">
          <i class="fas fa-download"></i> CSV
        </button>
        <button class="btn btn-primary btn-sm" onclick="loadData()">
          <i class="fas fa-sync-alt"></i> 새로고침
        </button>
      </div>
    </header>

    <main class="content">

      <!-- KPI 카드 -->
      <div class="stats-grid" id="kpi-row" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));">
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-truck"></i></div>
          <div class="stat-info">
            <div class="stat-label">오늘 출고</div>
            <div class="stat-value" id="kpi-today">-</div>
            <div class="stat-sub">건</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
          <div class="stat-info">
            <div class="stat-label">완료</div>
            <div class="stat-value" id="kpi-done">-</div>
            <div class="stat-sub">건</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon amber"><i class="fas fa-box-open"></i></div>
          <div class="stat-info">
            <div class="stat-label">총 박스 수</div>
            <div class="stat-value" id="kpi-boxes">-</div>
            <div class="stat-sub">박스</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon teal"><i class="fas fa-won-sign"></i></div>
          <div class="stat-info">
            <div class="stat-label">오늘 매출</div>
            <div class="stat-value" id="kpi-sales">-</div>
            <div class="stat-sub">합계</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple"><i class="fas fa-tags"></i></div>
          <div class="stat-info">
            <div class="stat-label">상품 종류</div>
            <div class="stat-value" id="kpi-skus">-</div>
            <div class="stat-sub">SKU</div>
          </div>
        </div>
      </div>

      <!-- 차트 행 -->
      <div class="chart-grid-2">
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-chart-bar"></i> 카테고리별 출고</div>
          </div>
          <div class="card-body chart-box">
            <canvas id="catChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-chart-pie"></i> 단가대별 분포</div>
          </div>
          <div class="card-body chart-box">
            <canvas id="priceChart"></canvas>
          </div>
        </div>
      </div>

      <!-- 필터 + 목록 -->
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="fas fa-list-alt"></i> 배송 내역</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <input type="date" class="form-control btn-sm" id="dateFrom" onchange="filterTable()">
            <span style="font-size:12px;color:var(--text-muted)">~</span>
            <input type="date" class="form-control btn-sm" id="dateTo" onchange="filterTable()">
            <div class="search-bar">
              <i class="fas fa-search search-icon"></i>
              <input type="text" class="form-control" id="searchInput" placeholder="상품명·바코드" oninput="filterTable()" style="width:200px;">
            </div>
            <select class="form-control btn-sm" id="statusFilter" onchange="filterTable()" style="width:100px;">
              <option value="">전체 상태</option>
              <option value="완료">완료</option>
              <option value="취소">취소</option>
            </select>
            <select class="form-control btn-sm" id="catFilter" onchange="filterTable()" style="width:130px;">
              <option value="">전체 카테고리</option>
            </select>
            <div class="date-tabs" style="margin:0;">
              <button class="date-tab active" onclick="setQuickDate(7,this)">7일</button>
              <button class="date-tab" onclick="setQuickDate(30,this)">30일</button>
              <button class="date-tab" onclick="setQuickDate(90,this)">90일</button>
            </div>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>출고일</th>
                <th>상품명</th>
                <th>카테고리</th>
                <th class="td-center">바코드</th>
                <th class="td-right">수량</th>
                <th class="td-right">박스수</th>
                <th class="td-right">단위 EA</th>
                <th class="td-right">매출액</th>
                <th class="td-center">상태</th>
                <th class="td-center">상세</th>
              </tr>
            </thead>
            <tbody id="delivery-tbody">
              <tr><td colspan="10" style="text-align:center;padding:40px;"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div style="padding:12px 22px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);">
          <span id="table-info" style="font-size:12px;color:var(--text-muted);"></span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- 상세 드로어 -->
<div class="detail-drawer" id="detailDrawer">
  <div class="drawer-header">
    <div class="modal-title"><i class="fas fa-info-circle"></i> 출고 상세</div>
    <button class="modal-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>
<div id="drawerBackdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:299;"
  onclick="closeDrawer()"></div>

<script src="js/common.js"></script>
<script>
let allRows = [];
let filteredRows = [];
let currentPage = 1;
const PAGE_SIZE = 40;
const charts = {};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

// ── 날짜 빠른 설정 ──
function setQuickDate(days, btn) {
  document.querySelectorAll('.date-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const to   = DateUtil.today();
  const from = DateUtil.nDaysAgo(days);
  document.getElementById('dateFrom').value = from;
  document.getElementById('dateTo').value   = to;
  loadData(days);
}

// ── 데이터 로드 ──
async function loadData(days = 7) {
  try {
    const data = await VF_API.outboundList({ days, limit: 1000 });
    allRows = Array.isArray(data) ? data : (data.results || data.data || []);
    buildFilters();
    renderKPI();
    renderCharts();
    filterTable();
  } catch (e) {
    Toast.error('배송 데이터 로드 실패: ' + e.message);
    document.getElementById('delivery-tbody').innerHTML =
      `<tr><td colspan="10" style="text-align:center;padding:40px;color:#ef4444;">${e.message}</td></tr>`;
  }
}

function buildFilters() {
  const cats = [...new Set(allRows.map(r => r.category).filter(Boolean))].sort();
  const sel = document.getElementById('catFilter');
  sel.innerHTML = '<option value="">전체 카테고리</option>' +
    cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

// ── KPI ──
function renderKPI() {
  const today = DateUtil.today();
  const todayRows = allRows.filter(r => r.outbound_date === today);
  document.getElementById('kpi-today').textContent = NumUtil.fmt(todayRows.length);
  document.getElementById('kpi-done').textContent  = NumUtil.fmt(todayRows.filter(r => r.status==='완료').length);
  const totalBoxes = todayRows.reduce((s,r) => s + (r.box_quantity || 0), 0);
  document.getElementById('kpi-boxes').textContent = NumUtil.fmt(totalBoxes);
  const totalSales = todayRows.reduce((s,r) => s + parseFloat(r.sales_amount || 0), 0);
  document.getElementById('kpi-sales').textContent = NumUtil.fmtKRW(totalSales);
  const skus = new Set(todayRows.map(r => r.barcode)).size;
  document.getElementById('kpi-skus').textContent = NumUtil.fmt(skus);
}

// ── 차트 ──
function renderCharts() {
  // 카테고리별
  const catMap = {};
  allRows.forEach(r => {
    const c = r.category || '기타';
    catMap[c] = (catMap[c] || 0) + (r.quantity || 1);
  });
  const catLabels = Object.keys(catMap).sort((a,b) => catMap[b] - catMap[a]);
  const catVals   = catLabels.map(c => catMap[c]);
  const colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#6366f1'];

  destroyChart('cat');
  charts['cat'] = new Chart(document.getElementById('catChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: catLabels.map(l => l.length > 10 ? l.slice(0,10)+'…' : l),
      datasets: [{ label: '출고 수량', data: catVals,
        backgroundColor: colors.slice(0, catLabels.length), borderRadius: 4 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { title: { display: true, text: '수량' } } } }
  });

  // 단가대별
  const priceBands = { '1만원 미만': 0, '1~2만원': 0, '2~3만원': 0, '3~5만원': 0, '5만원 이상': 0 };
  allRows.forEach(r => {
    const p = parseFloat(r.sales_amount || 0);
    if (p < 10000)       priceBands['1만원 미만']++;
    else if (p < 20000)  priceBands['1~2만원']++;
    else if (p < 30000)  priceBands['2~3만원']++;
    else if (p < 50000)  priceBands['3~5만원']++;
    else                 priceBands['5만원 이상']++;
  });

  destroyChart('price');
  charts['price'] = new Chart(document.getElementById('priceChart').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(priceBands),
      datasets: [{ data: Object.values(priceBands),
        backgroundColor: ['#dbeafe','#bfdbfe','#93c5fd','#60a5fa','#3b82f6'],
        borderWidth: 2 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } } }
  });
}

// ── 테이블 필터 ──
function filterTable() {
  const kw   = document.getElementById('searchInput').value.toLowerCase();
  const st   = document.getElementById('statusFilter').value;
  const cat  = document.getElementById('catFilter').value;
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;

  filteredRows = allRows.filter(r => {
    if (kw && !((r.product_name||'').toLowerCase().includes(kw) || (r.barcode||'').includes(kw))) return false;
    if (st  && r.status !== st) return false;
    if (cat && r.category !== cat) return false;
    if (from && r.outbound_date < from) return false;
    if (to   && r.outbound_date > to)   return false;
    return true;
  });
  currentPage = 1;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('delivery-tbody');
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filteredRows.slice(start, start + PAGE_SIZE);

  if (page.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:#94a3b8;">
      <i class="fas fa-inbox" style="font-size:32px;opacity:.3;display:block;margin-bottom:8px;"></i>
      조회된 배송 내역이 없습니다
    </td></tr>`;
    document.getElementById('table-info').textContent = '';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = page.map((r, i) => `
    <tr style="cursor:pointer;" onclick="openDrawer(${start+i})">
      <td>${DateUtil.fmt(r.outbound_date)}</td>
      <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${r.product_name}">${r.product_name||'-'}</td>
      <td><span class="badge badge-blue">${r.category||'-'}</span></td>
      <td class="td-center"><code style="font-size:11px;">${r.barcode||'-'}</code></td>
      <td class="td-right td-num">${NumUtil.fmt(r.quantity)}</td>
      <td class="td-right">${NumUtil.fmt(r.box_quantity)}</td>
      <td class="td-right">${NumUtil.fmt(r.unit_count)}</td>
      <td class="td-right td-num">${NumUtil.fmtKRWFull(r.sales_amount)}</td>
      <td class="td-center"><span class="badge ${r.status==='완료'?'badge-green':'badge-gray'}">${r.status||'-'}</span></td>
      <td class="td-center">
        <button class="btn btn-secondary btn-sm btn-icon" onclick="event.stopPropagation();openDrawer(${start+i})">
          <i class="fas fa-search"></i>
        </button>
      </td>
    </tr>
  `).join('');

  const total = filteredRows.length;
  document.getElementById('table-info').textContent =
    `총 ${NumUtil.fmt(total)}건 | ${start+1}–${Math.min(start+PAGE_SIZE, total)} 표시`;
  renderPagination(Math.ceil(total / PAGE_SIZE));
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  const start = Math.max(1, currentPage - 2);
  const end   = Math.min(totalPages, currentPage + 2);
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span style="padding:0 4px">…</span>':''}`;
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < totalPages) html += `${end<totalPages-1?'<span style="padding:0 4px">…</span>':''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const totalPages = Math.ceil(filteredRows.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
}

// ── 상세 드로어 ──
function openDrawer(idx) {
  const r = filteredRows[idx];
  if (!r) return;

  // 바코드 시각화 (간단한 패턴)
  const barPattern = generateBarcode(r.barcode || '');

  document.getElementById('drawerBody').innerHTML = `
    <div class="barcode-display">
      <div class="barcode-bars">${barPattern}</div>
      <div class="barcode-text">${r.barcode || '-'}</div>
    </div>
    <div class="detail-row"><div class="detail-label">출고일</div><div class="detail-value">${DateUtil.fmt(r.outboundDate)}</div></div>
    <div class="detail-row"><div class="detail-label">상품명</div><div class="detail-value">${r.productName||'-'}</div></div>
    <div class="detail-row"><div class="detail-label">카테고리</div><div class="detail-value"><span class="badge badge-blue">${r.category||'-'}</span></div></div>
    <div class="detail-row"><div class="detail-label">상태</div><div class="detail-value"><span class="badge ${r.status==='완료'?'badge-green':'badge-gray'}">${r.status||'-'}</span></div></div>
    <div class="detail-row"><div class="detail-label">수량</div><div class="detail-value">${NumUtil.fmt(r.quantity)} 개</div></div>
    <div class="detail-row"><div class="detail-label">박스 수</div><div class="detail-value">${NumUtil.fmt(r.boxQuantity)} 박스</div></div>
    <div class="detail-row"><div class="detail-label">단위(EA)</div><div class="detail-value">${NumUtil.fmt(r.unitCount)} EA</div></div>
    <div class="detail-row"><div class="detail-label">매출액</div><div class="detail-value" style="color:var(--primary)">${NumUtil.fmtKRWFull(r.salesAmount)}</div></div>
    <div class="detail-row"><div class="detail-label">거래처</div><div class="detail-value">${r.client||r.logisticsCenter||'-'}</div></div>
    <div class="detail-row"><div class="detail-label">등록시각</div><div class="detail-value">${DateUtil.fmtDateTime(r.createdAt||r.created_at)}</div></div>
  `;
  document.getElementById('detailDrawer').classList.add('open');
  document.getElementById('drawerBackdrop').style.display = 'block';
}

function closeDrawer() {
  document.getElementById('detailDrawer').classList.remove('open');
  document.getElementById('drawerBackdrop').style.display = 'none';
}

function generateBarcode(code) {
  // 바코드 숫자에서 간단한 바 패턴 생성
  const chars = (code || '0000000000').replace(/\D/g,'').padEnd(10,'0');
  let bars = '';
  for (let i = 0; i < chars.length; i++) {
    const n = parseInt(chars[i]);
    const heights = [20,25,30,35,40,45,38,32,28,22];
    const h = heights[n];
    bars += `<div class="barcode-bar" style="height:${h}px;width:${n%2===0?2:3}px;background:#000;"></div>`;
    if (i < chars.length-1) bars += `<div style="width:${n%3===0?3:1}px;"></div>`;
  }
  return bars;
}

// ── CSV 내보내기 ──
function exportCSV() {
  const rows = [['출고일','상품명','카테고리','바코드','수량','박스수','단위EA','매출액','상태']];
  filteredRows.forEach(r => rows.push([
    r.outboundDate, r.productName, r.category, r.barcode,
    r.quantity, r.boxQuantity, r.unitCount, r.salesAmount, r.status
  ]));
  downloadCSV(rows, `배송내역_${DateUtil.today()}.csv`);
}

// ── 초기화 ──
document.addEventListener('DOMContentLoaded', () => {
  const to   = DateUtil.today();
  const from = DateUtil.nDaysAgo(7);
  document.getElementById('dateFrom').value = from;
  document.getElementById('dateTo').value   = to;
  loadData(7);
});
</script>
</body>
</html>
